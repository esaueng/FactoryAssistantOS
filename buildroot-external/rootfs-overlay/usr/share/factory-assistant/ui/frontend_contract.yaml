# Factory Assistant frontend experience contract.
#
# SPDX-License-Identifier: Apache-2.0
# Copyright Factory Assistant contributors.
#
# This is a machine-readable handoff for the frontend fork. The OS image ships
# stock Lovelace dashboards today; the fork consumes this contract to implement
# native plant navigation, machine tiles, and kiosk/andon views without adding
# control surfaces.
contract:
  id: factory_assistant_frontend_experience
  version: 1
  consumer: frontend
  status: contract_for_frontend_fork

branding:
  product_name: Factory Assistant
  home_assistant_as_brand: false
  upstream_attribution: Factory Assistant is based on Home Assistant.

default_experience:
  default_route: /lovelace
  default_dashboard: dashboards/factory-overview.yaml
  andon_dashboard: dashboards/andon.yaml
  wallboard_dashboard: dashboards/wallboard.yaml
  theme: factory-assistant

navigation:
  primary_items:
    - Plant overview
    - Alerts
    - Energy
    - History
    - Logbook
    - Maintenance
  hidden_by_default:
    - Media
    - Map
    - To-do
  settings_visibility: admin_only

terminology:
  status: os_shipped_handoff
  home_assistant_attribution: Factory Assistant is based on Home Assistant.
  cli_command: ha
  cli_display_name: Factory Assistant CLI
  canonical_user_terms:
    product: Factory Assistant
    os: Factory Assistant OS
    default_landing: Plant overview
    site: site
    line: line
    cell: cell
    station: station
    machine: machine
    wallboard: Wallboard
    andon: Andon
  user_facing_replacements:
    home: Plant overview
    household: site
    area: line or cell
    Home Assistant CLI: Factory Assistant CLI
    HA CLI: Factory Assistant CLI
  forbidden_user_facing_patterns:
    - Home Assistant CLI
    - HA CLI
    - Home dashboard
    - home-centric setup
  allowed_home_assistant_contexts:
    - canonical upstream attribution
    - internal upstream-compatible identifiers
    - license and NOTICE provenance

machine_card:
  component: fa-machine-card
  tap_action: detail_only
  control_affordances_allowed: false
  freshness_required: true
  stale_after_intervals: 3
  offline_after_intervals: 10
  states:
    running:
      label: Running
      icon: mdi:play-circle
      color_token: --fa-state-running
    idle:
      label: Idle
      icon: mdi:pause-circle
      color_token: --fa-state-idle
    blocked:
      label: Blocked
      icon: mdi:timer-sand
      color_token: --fa-state-blocked
    down:
      label: Down
      icon: mdi:alert-octagon
      color_token: --fa-state-down
    maintenance:
      label: Maintenance
      icon: mdi:wrench
      color_token: --fa-state-maint
    offline:
      label: Offline
      icon: mdi:lan-disconnect
      color_token: --fa-state-offline

kiosk_mode:
  component: factory-wallboard-kiosk
  source_dashboard: dashboards/wallboard.yaml
  hide_sidebar: true
  hide_header: true
  type_scale: 1.6
  interaction: view_only
  auto_cycle_optional: true

andon_view:
  component: fa-andon-view
  source_dashboard: dashboards/andon.yaml
  acknowledge_is_bookkeeping: true
  safety_alarm_claim_allowed: false
  severities:
    - info
    - warning
    - critical

about_panel:
  component: factory-about-panel
  product_name: Factory Assistant
  upstream_attribution: Factory Assistant is based on Home Assistant.
  non_affiliation_notice_required: true
  safety_disclaimer_required: true
  links:
    safety_boundary:
      label: Safety boundary
      document: docs/SAFETY_BOUNDARY.md
      required: true
    open_source_licenses:
      label: Open source licenses
      release_artifact: legal-info
      required: true

onboarding:
  contract: onboarding/wizard_steps.yaml
  site_model: onboarding/site_model.example.yaml
  default_cloud_enabled: false
  default_analytics_enabled: false

safety:
  monitoring_only: true
  machine_control: false
  control_surfaces_allowed: false
  required_disclaimer: Factory Assistant is a monitoring tool, not a safety device. Dashboards and notifications must never be the sole means of detecting a hazardous condition.
