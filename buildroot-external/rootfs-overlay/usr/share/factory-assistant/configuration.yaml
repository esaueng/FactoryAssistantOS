# Factory Assistant — industrial default Core configuration template.
#
# Shipped read-only in the OS image at /usr/share/factory-assistant/.
# On a true first boot the fa-seed-config oneshot copies this whole tree into
# the Home Assistant config directory if no configuration.yaml exists yet; it
# never overwrites existing config. That host-side seed is a best-effort
# SCAFFOLD (the config dir is a Supervisor-managed volume) — see
# docs/INDUSTRIAL_DEFAULTS.md §"Config seeding mechanism". You can also copy
# this tree into /config manually at commissioning.
#
# SAFETY: every industrial protocol example below is READ-ONLY. Do not add
# write/control paths here — see docs/SAFETY_BOUNDARY.md.
#
# --- Deployment defaults / commissioning checklist --------------------------
# Surfacing these as first-boot onboarding steps needs Core/Supervisor changes
# and is out of scope here (docs/INDUSTRIAL_DEFAULTS.md); treat them as the
# recommended manual checklist for now.
#
#   * NTP (REQUIRED): keep the appliance clock disciplined to a plant NTP
#     server so recorder/history timestamps are trustworthy. The OS syncs time
#     via systemd-timesyncd; point it at the site NTP source and set the
#     time zone during onboarding (Settings -> System -> Date & Time).
#   * Static IP (recommended): plants standardize on static addressing.
#     Configure it via Settings -> System -> Network (NetworkManager), not in
#     this file. DHCP works out of the box for initial commissioning.
#   * Local-first allowlist: default_config is deliberately not used because it
#     pulls in upstream home/cloud/analytics-oriented defaults. Factory
#     Assistant loads explicit local integrations below; cloud/analytics
#     defaults intentionally omitted.
#   * Mosquitto (offer): for MQTT sensors/gateways, install the Mosquitto
#     broker add-on (Settings -> Add-ons), then add the MQTT integration —
#     see the MQTT section below.

# --- Local-first integrations ------------------------------------------------
# Explicit replacement for default_config. Keep this list local-network focused:
# backup/config for appliance administration; DHCP/SSDP/zeroconf for plant LAN
# discovery; history/logbook/energy/system_health for monitoring. Cloud,
# Usage Prediction, Home Assistant Alerts, and My Home Assistant are
# intentionally not loaded by the shipped template.
backup:
config:
dhcp:
energy:
history:
logbook:
ssdp:
system_health:
zeroconf:

homeassistant:
  name: "Factory Assistant"        # replaced with the site name during onboarding
  unit_system: metric
  # time_zone and location are set during onboarding; plants should also
  # configure NTP so timestamps in the recorder are trustworthy.
  # Industrial example packages (OEE, maintenance reminders, andon ack). Each
  # is a per-machine template you copy and adapt at commissioning; they render
  # "unavailable" until mapped to real entities. See packages/*.yaml.
  packages: !include_dir_named packages

# Telemetry retention tuned for plant-floor data volumes. Long-term archival
# belongs in a dedicated historian/TSDB add-on (see docs/ARCHITECTURE.md).
recorder:
  purge_keep_days: 30
  commit_interval: 5

# --- Factory UI: theme + default dashboard (docs/UI_DESIGN.md) --------------
# Assumes the whole /usr/share/factory-assistant/ tree was copied into
# /config, so themes/ and dashboards/ sit alongside this file.
frontend:
  themes: !include_dir_merge_named themes

lovelace:
  # Plant overview is the default Lovelace dashboard on first boot. This makes
  # the first UI landing surface the factory dashboard instead of the upstream
  # home/areas dashboard. Site engineers can later move back to UI-managed
  # dashboards deliberately from Settings -> Dashboards.
  # Area dashboards can be generated from onboarding/site_model.example.yaml
  # with the build repo's area dashboard generator. The checked-in reference
  # output is dashboards/area-dashboards.example.yaml; copy it to a site
  # dashboard path and register it below after commissioning the real line/cell
  # taxonomy.
  mode: yaml
  filename: dashboards/factory-overview.yaml
  dashboards:
    # Full-screen andon board for alerts triage / a dedicated alerts wallboard
    # (docs/UI_DESIGN.md §6). Ack bookkeeping lives in packages/andon_example.yaml.
    andon:
      mode: yaml
      title: Andon
      icon: mdi:alert-decagram
      show_in_sidebar: true
      filename: dashboards/andon.yaml
    # Unattended plant wallboard (docs/UI_DESIGN.md §7). Off the sidebar —
    # displays open it by direct URL (/wallboard/status) under a view-only user.
    wallboard:
      mode: yaml
      title: Wallboard
      icon: mdi:monitor-dashboard
      show_in_sidebar: false
      filename: dashboards/wallboard.yaml

# --- Plant KPI sensors (drive the overview dashboard's "Shift status") ------
# Defined as a ready-to-adapt package in packages/kpi_example.yaml (loaded via
# the `packages:` include above). It provides:
#   sensor.plant_machines_running / sensor.plant_active_alerts — derived
#     automatically from the *_running / *_alert naming convention
#     (docs/INDUSTRIAL_DEFAULTS.md §2);
#   sensor.plant_shift_output — shift good-part output (map to a line counter
#     at commissioning).
# Two related KPIs live with their domain packages:
#   sensor.plant_power_now — incomer meter, packages/energy_example.yaml;
#   sensor.plant_oee       — plant-wide OEE, packages/oee_example.yaml.

# --- MQTT (sensors, gateways, machine data) --------------------------------
# 1. Install the Mosquitto broker add-on (Settings -> Add-ons).
# 2. Add the MQTT integration (Settings -> Devices & Services).
# Topic convention (see docs/INDUSTRIAL_DEFAULTS.md §2):
#   fa/<site>/<area>/<device>/<measurement>
# Worked READ-ONLY example (MQTT discovery + manual sensors):
#   examples/mqtt_example.yaml  (conventions: examples/README.md)

# --- Modbus TCP (PLC gateways, energy meters) — READ-ONLY -------------------
# Reads only (input/holding registers, function codes 3/4); write calls are
# prohibited by policy (docs/SAFETY_BOUNDARY.md). Worked read-only example:
#   examples/modbus_example.yaml  (conventions: examples/README.md)

# --- OPC UA ------------------------------------------------------------------
# OPC UA servers are integrated through the planned OPC UA bridge add-on,
# which subscribes to server nodes (read-only) and republishes to MQTT using
# the topic convention above. See docs/ARCHITECTURE.md §Industrial data flows.
