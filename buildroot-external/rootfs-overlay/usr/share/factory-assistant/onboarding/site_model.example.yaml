# Factory Assistant site model scaffold.
#
# Copy this file into the site's config repository during commissioning and
# replace the placeholders. Future frontend/Supervisor onboarding can consume
# the same shape to create areas, labels, dashboards, and gateway mappings.
#
# Monitoring only: this file describes where telemetry comes from. It contains
# no machine-control path and no safety function.
site:
  name: Example Plant
  slug: plant1
  time_zone: America/Detroit
  ntp_servers:
    - ntp.plant.example

local_first:
  cloud: false
  analytics: false
  remote_access: false

network:
  commissioning_host: factory-assistant.local
  static_ip_guidance: true
  vlan_note: Monitoring VLAN or OT/IT DMZ; never a safety network.

broker:
  mosquitto_offer: true
  mqtt_topic_root: fa/plant1

safety:
  monitoring_only: true
  machine_control: false
  safety_function: false
  note: Factory Assistant is a monitoring tool, not a safety device.

protocols:
  mqtt:
    discovery_preferred: true
    command_topics_allowed: false
    topic_shape: fa/<site>/<area>/<device>/<measurement>
  modbus_tcp:
    read_only: true
    allowed_function_codes: [3, 4]
    min_scan_interval_seconds: 1
  opcua:
    mode: subscribe_only
    bridge_addon: planned
    republish_to_mqtt: true

lines:
  - id: line1
    name: Line 1
    cells:
      - id: line1_cell1
        name: Press cell
        stations:
          - id: line1_cell1_station1
            name: Press station
            machines:
              - id: line1_press03
                name: Press 03
                class: press
                mqtt_topic_prefix: fa/plant1/line1/press03
                entities:
                  - binary_sensor.line1_press03_running
                  - sensor.line1_press03_state
                  - sensor.line1_press03_rate
                  - sensor.line1_press03_motor_temp
                  - binary_sensor.line1_press03_overtemp_alert
                protocols:
                  mqtt: true
                  modbus_tcp: true
                  opcua: false
  - id: line2
    name: Line 2
    cells:
      - id: line2_cell1
        name: Extrusion cell
        stations:
          - id: line2_cell1_station1
            name: Extruder station
            machines:
              - id: line2_extr01
                name: Extruder 01
                class: extruder
                mqtt_topic_prefix: fa/plant1/line2/extr01
                entities:
                  - binary_sensor.line2_extr01_running
                  - sensor.line2_extr01_state
                  - sensor.line2_extr01_rate
                  - sensor.line2_extr01_pressure
                  - binary_sensor.line2_extr01_pressure_alert
                protocols:
                  mqtt: true
                  modbus_tcp: false
                  opcua: true
