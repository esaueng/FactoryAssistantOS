# Fast validation of the Factory Assistant overlay repo — shell scripts, Core
# YAML templates (themes/dashboards/packages/configuration), the update-channel
# JSON + schema, and Markdown cross-links. Unlike build-os-image.yml this needs
# no Docker, no Buildroot, and no large disk: it runs in seconds on every push
# and PR, so template/schema/link rot is caught before a 4 h image build.
#
# The work lives in scripts/lint.sh (also runnable locally via `make lint`);
# this workflow just installs the strict optional tools it uses.
name: Lint

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Validate scripts, YAML, channel JSON, docs
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck jq
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet pyyaml yamllint jsonschema check-jsonschema

      - name: Run lint
        run: ./scripts/lint.sh

      - name: Verify channel generator output validates
        # Generates a throwaway document from identity.env and the schema to
        # prove generate-channel.sh stays in sync with channel.schema.json.
        run: |
          ./version-service/generate-channel.sh \
            --channel stable --supervisor 2026.05.0 --core 2026.5.0 \
            --os-board generic-x86-64 --os-version 17.3 --out /tmp/stable.json
          check-jsonschema --schemafile version-service/schema/channel.schema.json /tmp/stable.json
