# Factory Assistant industrial add-on catalog.
#
# SPDX-License-Identifier: Apache-2.0
# Copyright Factory Assistant contributors.
#
# This catalog is a commissioning contract for add-ons that live outside this
# OS repository. It intentionally describes monitoring-only, read-only behavior.
catalog:
  id: factory_assistant_industrial_addons
  version: 1
  repository: factory-assistant-addons
  repository_url: https://github.com/esaueng/factory-assistant-addons
  mqtt_broker_offer: mosquitto
  topic_shape: fa/<site>/<area>/<device>/<measurement>
  safety_posture: monitoring_only

addons:
  - id: opcua_mqtt_bridge
    name: OPC UA to MQTT Bridge
    repository: factory-assistant-addons
    type: bridge
    status: available
    local_first: true
    packaging:
      repository: factory-assistant-addons
      slug: opcua_mqtt_bridge
      image: ghcr.io/esaueng/{arch}-addon-opcua-mqtt-bridge
      arch:
        - amd64
      boot: manual
      startup: services
      host_network: false
      privileged: false
    depends_on:
      - mosquitto
    summary: Subscribe to curated OPC UA telemetry nodes and publish MQTT discovery.
    opcua:
      mode: subscribe_only
      write_nodes_allowed: false
      namespace_browse_default: curated_only
      safety_controller_allowed: false
    mqtt:
      discovery: true
      topic_shape: fa/<site>/<area>/<device>/<measurement>
      command_topics_allowed: false
      availability_topics: true
    options_schema:
      endpoint_url: opc.tcp://plc-gateway.example:4840
      node_allowlist: /config/factory-assistant/opcua_nodes.yaml
      publish_interval_seconds: 5
      security_policy: Basic256Sha256
      write_nodes_allowed: false
    safety:
      monitoring_only: true
      machine_control: false
      safety_function: false

  - id: plc_gateway_helper
    name: PLC Gateway Helper
    repository: factory-assistant-addons
    type: helper
    status: available
    local_first: true
    packaging:
      repository: factory-assistant-addons
      slug: plc_gateway_helper
      image: ghcr.io/esaueng/{arch}-addon-plc-gateway-helper
      arch:
        - amd64
      boot: manual
      startup: services
      host_network: false
      privileged: false
    summary: Normalize read-only telemetry from PLC gateways and meters.
    targets:
      - plc_gateway
      - energy_meter
      - protocol_converter
    modbus_tcp:
      read_only: true
      allowed_function_codes:
        - 3
        - 4
      write_functions_allowed: false
      safety_controller_allowed: false
    output:
      mqtt_discovery: true
      topic_shape: fa/<site>/<area>/<device>/<measurement>
    options_schema:
      register_map_path: /config/factory-assistant/register_maps.yaml
      poll_interval_seconds: 5
      unit_id: 1
      mqtt_discovery: true
      allowed_function_codes:
        - 3
        - 4
      write_functions_allowed: false
    safety:
      monitoring_only: true
      machine_control: false
      safety_function: false

  - id: historian_storage
    name: Historian Storage
    repository: factory-assistant-addons
    type: historian
    status: available
    local_first: true
    packaging:
      repository: factory-assistant-addons
      slug: historian_storage
      image: ghcr.io/esaueng/{arch}-addon-historian-storage
      arch:
        - amd64
      boot: manual
      startup: services
      host_network: false
      privileged: false
    cloud_required: false
    machine_control: false
    summary: Store long-term plant telemetry without making the appliance cloud-dependent.
    engines:
      - influxdb
      - timescaledb
    inputs:
      - mqtt
      - core_recorder_export
    retention:
      default_policy: site_defined
      long_term_storage: true
    options_schema:
      engine: influxdb
      retention_days: 365
      local_volume: /data/historian
      cloud_export_enabled: false
    safety:
      monitoring_only: true
      machine_control: false
      safety_function: false
