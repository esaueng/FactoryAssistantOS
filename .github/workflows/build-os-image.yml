# Build a Factory Assistant OS image (generic x86-64) and, on a version tag,
# publish it as a GitHub Release.
#
# This is the production-correct way to cut a release image: it runs on a
# runner with enough disk and open network to clone upstream + the Buildroot
# submodule and fetch the hundreds of source packages a full OS build needs.
# (It deliberately does NOT run in restricted sandboxes — a from-source
#  Buildroot build wants ~50 GB of disk and broad outbound network.)
#
# Triggers:
#   * workflow_dispatch — build on demand, uploads the image as an artifact.
#   * push of a tag like v17.3-fa.1 — build AND attach the image, checksum,
#     and license bundle to a GitHub Release.
#
# Signing: set the FAOS_RAUC_KEYRING_PEM, FAOS_RAUC_CERT_PEM, and
# FAOS_RAUC_KEY_PEM repository secrets to produce trusted OTA bundles. Tag
# release builds require all three secrets. Manual workflow_dispatch builds may
# still produce flash-only development artifacts with upstream's public
# self-signed dev certificate when no RAUC secrets are set.
name: Build Factory Assistant OS image

on:
  workflow_dispatch:
    inputs:
      board:
        description: "Board id to build"
        default: "generic-x86-64"
        type: choice
        options: ["generic-x86-64"]
  push:
    tags: ["v*"]

permissions:
  contents: write # create releases / upload assets on tag builds

jobs:
  build:
    name: Build Factory Assistant OS (generic-x86-64)
    runs-on: ubuntu-22.04
    env:
      DEFCONFIG: generic_x86_64 # Buildroot defconfig for board generic-x86-64
      BOARD_ID: generic-x86-64
    steps:
      - name: Checkout Factory Assistant OS overlay repo
        uses: actions/checkout@v4

      - name: Free space on build drive
        # This runner image has a SINGLE ~73 GB root volume and NO separate
        # large /mnt ephemeral disk (confirmed: `df` shows only /dev/root) — so
        # a from-source Buildroot build (~50 GB) must reclaim space from the
        # preinstalled toolchains on /; there is nowhere else to offload to.
        # The first v1 build ran the full 4 h compile inside the timid ~29 GB
        # the old cleanup left, then overflowed / while pulling the hassio
        # container images at the final image-assembly stage. Free aggressively.
        run: |
          echo "Before cleanup:"; df -h /
          # Big preinstalled toolchains we never use for an OS image build.
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc /usr/local/.ghcup \
            /usr/share/swift \
            /usr/local/share/boost \
            /usr/local/share/powershell \
            /opt/microsoft \
            /opt/hostedtoolcache/CodeQL || true
          # Preinstalled Docker images (we build our own faos-builder image).
          sudo docker image prune --all --force || true
          # Large apt packages unrelated to the build (build runs in a container).
          sudo apt-get purge -y -qq '^llvm-.*' '^libllvm.*' '^mongodb-.*' \
            '^mysql-.*' 'php.*' azure-cli google-cloud-cli powershell \
            mono-devel 2>/dev/null || true
          sudo apt-get autoremove -y -qq 2>/dev/null || true
          sudo apt-get clean
          # No second disk here: build output + ccache live on the root volume.
          sudo mkdir -p /mnt/cache /mnt/output
          sudo chown -R "$(id -u):$(id -g)" /mnt/cache /mnt/output
          echo "After cleanup:"; df -h /

      - name: Fetch pinned upstream OS sources (+ Buildroot submodule)
        run: ./scripts/bootstrap.sh

      - name: Apply the Factory Assistant overlay
        run: ./scripts/apply-overlay.sh

      - name: Verify shipped branding and safety policy
        run: |
          ./scripts/verify-shipped-branding.sh
          ./scripts/verify-safety-boundary.sh

      - name: Configure RAUC signing inputs
        id: rauc_signing
        env:
          FAOS_RAUC_KEYRING_PEM: ${{ secrets.FAOS_RAUC_KEYRING_PEM }}
          FAOS_RAUC_CERT_PEM: ${{ secrets.FAOS_RAUC_CERT_PEM }}
          FAOS_RAUC_KEY_PEM: ${{ secrets.FAOS_RAUC_KEY_PEM }}
        run: |
          set -euo pipefail
          has_keyring=0
          has_cert=0
          has_key=0
          [ -n "${FAOS_RAUC_KEYRING_PEM:-}" ] && has_keyring=1
          [ -n "${FAOS_RAUC_CERT_PEM:-}" ] && has_cert=1
          [ -n "${FAOS_RAUC_KEY_PEM:-}" ] && has_key=1

          if [ "${has_keyring}${has_cert}${has_key}" = "111" ]; then
            rauc_dir="${RUNNER_TEMP}/faos-rauc"
            install -d -m 0700 "${rauc_dir}"
            umask 077
            printf '%s\n' "${FAOS_RAUC_KEYRING_PEM}" > "${rauc_dir}/keyring.pem"
            printf '%s\n' "${FAOS_RAUC_CERT_PEM}" > "${rauc_dir}/cert.pem"
            printf '%s\n' "${FAOS_RAUC_KEY_PEM}" > "${rauc_dir}/key.pem"
            ./scripts/verify-release-readiness.sh \
              --channel version-service/stable.json \
              --keyring "${rauc_dir}/keyring.pem" \
              --cert "${rauc_dir}/cert.pem" \
              --key "${rauc_dir}/key.pem"
            ./scripts/configure-rauc-signing.sh \
              --keyring "${rauc_dir}/keyring.pem" \
              --cert "${rauc_dir}/cert.pem" \
              --key "${rauc_dir}/key.pem"
            {
              echo "trusted=true"
              echo "release_note<<EOF"
              echo "RAUC bundles are signed with the configured Factory Assistant OTA signing key. Devices built from this image trust only the configured Factory Assistant OTA CA for RAUC updates."
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          elif [ "${has_keyring}${has_cert}${has_key}" != "000" ]; then
            echo "::error::Configure all three RAUC secrets together: FAOS_RAUC_KEYRING_PEM, FAOS_RAUC_CERT_PEM, and FAOS_RAUC_KEY_PEM."
            exit 1
          else
            if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
              echo "::error::Trusted tag releases require all three RAUC secrets: FAOS_RAUC_KEYRING_PEM, FAOS_RAUC_CERT_PEM, and FAOS_RAUC_KEY_PEM."
              exit 1
            fi
            echo "::warning::No Factory Assistant RAUC keys configured — workflow_dispatch builds may still produce flash-only development artifacts with a PUBLIC self-signed dev certificate. The OTA bundle is NOT trusted. See docs/OS_BUILD.md §Signing."
            ( cd upstream/operating-system && buildroot-external/scripts/generate-signing-key.sh cert.pem key.pem )
            {
              echo "trusted=false"
              echo "release_note<<EOF"
              echo "WARNING: Manual development build with a public self-signed RAUC certificate: flash-only, OTA updates are not trusted on this build. Tag builds require all three Factory Assistant RAUC secrets."
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          fi

      - name: Build the upstream builder container image
        run: docker build -t faos-builder upstream/operating-system

      - name: Configure Buildroot (defconfig + Factory Assistant overrides)
        run: |
          docker run --rm --privileged \
            -e BUILDER_UID="$(id -u)" -e BUILDER_GID="$(id -g)" \
            -v "${GITHUB_WORKSPACE}/upstream/operating-system:/build" \
            -v "/mnt/cache:/cache" \
            -v "/mnt/output:/build/output" \
            faos-builder make "${DEFCONFIG}_defconfig"

      - name: Build the image (long — full Buildroot compile)
        run: |
          docker run --rm --privileged \
            -e BUILDER_UID="$(id -u)" -e BUILDER_GID="$(id -g)" \
            -v "${GITHUB_WORKSPACE}/upstream/operating-system:/build" \
            -v "/mnt/cache:/cache" \
            -v "/mnt/output:/build/output" \
            faos-builder make

      - name: Generate third-party license bundle
        # Apache-2.0 / copyleft compliance — see docs/LICENSE_COMPLIANCE.md §3.
        run: |
          docker run --rm --privileged \
            -e BUILDER_UID="$(id -u)" -e BUILDER_GID="$(id -g)" \
            -v "${GITHUB_WORKSPACE}/upstream/operating-system:/build" \
            -v "/mnt/cache:/cache" \
            -v "/mnt/output:/build/output" \
            faos-builder make legal-info || echo "::warning::legal-info step failed; generate the license bundle manually before distributing."

      - name: Collect artifacts and checksums
        id: collect
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/release"
          shopt -s nullglob
          imgs=(/mnt/output/images/faos_${BOARD_ID}-*.img.xz)
          if [ ${#imgs[@]} -eq 0 ]; then
            echo "No faos_${BOARD_ID}-*.img.xz produced — check the build log." >&2
            ls -la /mnt/output/images/ || true
            exit 1
          fi
          cp "${imgs[@]}" "${GITHUB_WORKSPACE}/release/"
          # OTA bundle, if present. Trust depends on the RAUC signing step.
          cp /mnt/output/images/faos_${BOARD_ID}-*.raucb "${GITHUB_WORKSPACE}/release/" 2>/dev/null || true
          # License bundle
          if [ -d /mnt/output/legal-info ]; then
            tar -C /mnt/output -czf "${GITHUB_WORKSPACE}/release/faos_${BOARD_ID}-legal-info.tar.gz" legal-info
          fi
          cd "${GITHUB_WORKSPACE}/release"
          sha256sum * > SHA256SUMS
          echo "Artifacts:"; ls -la
          echo "image_glob=release/faos_${BOARD_ID}-*.img.xz" >> "$GITHUB_OUTPUT"

      - name: Write release notes
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RAUC_RELEASE_NOTE: ${{ steps.rauc_signing.outputs.release_note }}
        run: |
          {
            printf '**Factory Assistant OS — %s** (board: `%s`)\n\n' "${GITHUB_REF_NAME}" "${BOARD_ID}"
            printf 'Factory Assistant is based on Home Assistant. Monitoring appliance —\n'
            printf '**not a safety device** (see `docs/SAFETY_BOUNDARY.md`).\n\n'
            printf '%s\n\n' "${RAUC_RELEASE_NOTE}"
            printf 'Flash `faos_%s-*.img.xz` to an x86-64 machine\n' "${BOARD_ID}"
            printf '(`docs/OS_BUILD.md` §3), boot, then open\n'
            printf '`http://factory-assistant.local:8123`. Verify downloads against\n'
            printf '`SHA256SUMS`.\n'
          } > release/RELEASE_NOTES.md

      - name: Write RAUC trust manifest
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          ./scripts/write-rauc-trust-manifest.sh \
            --keyring "${RUNNER_TEMP}/faos-rauc/keyring.pem" \
            --cert "${RUNNER_TEMP}/faos-rauc/cert.pem" \
            --out release/RAUC_TRUST.json

      - name: Refresh release checksums
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          python3 - <<'PY'
          import hashlib
          from pathlib import Path

          root = Path("release")
          with (root / "SHA256SUMS").open("w", encoding="utf-8") as fh:
              for path in sorted(root.iterdir()):
                  if not path.is_file() or path.name == "SHA256SUMS":
                      continue
                  fh.write(f"{hashlib.sha256(path.read_bytes()).hexdigest()}  {path.name}\n")
          PY

      - name: Verify trusted release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        run: ./scripts/verify-release-artifacts.sh --release-dir release --board "${BOARD_ID}" --trusted

      - name: Verify OTA channel artifact
        if: startsWith(github.ref, 'refs/tags/')
        run: ./scripts/verify-ota-channel-artifact.sh --channel version-service/stable.json --board "${BOARD_ID}" --release-dir release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: faos-${{ env.BOARD_ID }}
          path: release/
          if-no-files-found: error

      - name: Publish GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/faos_${{ env.BOARD_ID }}-*.img.xz
            release/faos_${{ env.BOARD_ID }}-*.raucb
            release/faos_${{ env.BOARD_ID }}-legal-info.tar.gz
            release/RAUC_TRUST.json
            release/SHA256SUMS
          body_path: release/RELEASE_NOTES.md

      - name: Scrub RAUC signing inputs
        if: always()
        run: |
          set -euo pipefail
          scrub_file() {
            local path="$1"
            [ -f "$path" ] || return 0
            if command -v shred >/dev/null 2>&1; then
              shred -u "$path"
            else
              rm -f "$path"
            fi
          }

          scrub_file "${GITHUB_WORKSPACE}/upstream/operating-system/key.pem"
          scrub_file "${GITHUB_WORKSPACE}/upstream/operating-system/cert.pem"
          scrub_file "${RUNNER_TEMP}/faos-rauc/key.pem"
          scrub_file "${RUNNER_TEMP}/faos-rauc/cert.pem"
          scrub_file "${RUNNER_TEMP}/faos-rauc/keyring.pem"
          rm -rf "${RUNNER_TEMP}/faos-rauc"
