# Maintain a standing upstream release/security tracking issue. The workflow is
# intentionally read-only against source: it reports drift and review work, then
# humans choose when to bump pins and run the rebrand checklist.
name: Track upstream releases and security

on:
  schedule:
    - cron: "17 10 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  track:
    name: Update upstream tracking issue
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update tracking issue
        uses: actions/github-script@v7
        env:
          TRACKER_TITLE: "Upstream release/security tracking"
        with:
          script: |
            const fs = require("fs");

            const upstreamEnv = fs.readFileSync("upstream.env", "utf8");
            const repoMatches = [...upstreamEnv.matchAll(
              /^UPSTREAM_([A-Z0-9_]+)_REPO="https:\/\/github\.com\/([^/]+)\/([^"]+?)(?:\.git)?"$/gm,
            )];
            const refMatches = [...upstreamEnv.matchAll(
              /^UPSTREAM_([A-Z0-9_]+)_REF="([^"]+)"$/gm,
            )];
            const refs = new Map(refMatches.map((match) => [match[1], match[2]]));

            async function latestFor(owner, repo) {
              try {
                const release = await github.rest.repos.getLatestRelease({ owner, repo });
                return {
                  kind: "release",
                  value: release.data.tag_name,
                  url: release.data.html_url,
                };
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }

              const tags = await github.rest.repos.listTags({
                owner,
                repo,
                per_page: 1,
              });
              if (tags.data.length === 0) {
                return { kind: "none", value: "no release/tag found", url: "" };
              }
              return {
                kind: "tag",
                value: tags.data[0].name,
                url: `https://github.com/${owner}/${repo}/releases/tag/${tags.data[0].name}`,
              };
            }

            async function latestPublishedAdvisoryFor(owner, repo) {
              try {
                const advisories = await github.paginate(
                  "GET /repos/{owner}/{repo}/security-advisories",
                  {
                    owner,
                    repo,
                    state: "published",
                    sort: "published",
                    direction: "desc",
                    per_page: 5,
                  },
                );
                const advisory = advisories.find((item) => !item.withdrawn_at);
                if (!advisory) {
                  return {
                    kind: "none",
                    value: "no published repository advisories",
                    url: "",
                  };
                }
                return {
                  kind: "published",
                  value: `${advisory.ghsa_id} (${advisory.severity})`,
                  url: advisory.html_url,
                  summary: advisory.summary,
                  publishedAt: advisory.published_at,
                };
              } catch (error) {
                if ([403, 404].includes(error.status)) {
                  return {
                    kind: "unavailable",
                    value: `repository advisory check unavailable (${error.status})`,
                    url: "",
                  };
                }
                throw error;
              }
            }

            const rows = [];
            for (const match of repoMatches) {
              const key = match[1];
              const upstreamOwner = match[2];
              const upstreamRepo = match[3];
              const latest = await latestFor(upstreamOwner, upstreamRepo);
              const advisory = await latestPublishedAdvisoryFor(upstreamOwner, upstreamRepo);
              const pinned = refs.get(key) || "not pinned here";
              const status = refs.has(key) && refs.get(key) !== latest.value
                ? "review available upstream change"
                : "tracked";
              rows.push({
                key,
                repo: `${upstreamOwner}/${upstreamRepo}`,
                pinned,
                latest,
                advisory,
                status,
              });
            }

            const driftRows = rows.filter((row) => row.status !== "tracked");
            const advisoryRows = rows.filter((row) => row.advisory.kind === "published");
            const advisoryUnavailableRows = rows.filter((row) => row.advisory.kind === "unavailable");
            const table = [
              "| Component | Upstream | Pinned here | Latest upstream | Latest published advisory | Status |",
              "|---|---|---|---|---|---|",
              ...rows.map((row) => {
                const latest = row.latest.url
                  ? `[${row.latest.value}](${row.latest.url})`
                  : row.latest.value;
                const advisory = row.advisory.url
                  ? `[${row.advisory.value}](${row.advisory.url})`
                  : row.advisory.value;
                return `| ${row.key} | ${row.repo} | ${row.pinned} | ${latest} (${row.latest.kind}) | ${advisory} (${row.advisory.kind}) | ${row.status} |`;
              }),
            ].join("\n");

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const driftSummary = driftRows.length === 0
              ? "No pinned upstream ref drift was detected."
              : `${driftRows.length} pinned upstream ref(s) need review.`;
            const advisorySummary = advisoryRows.length === 0
              ? "No published repository security advisories were found by the repository security advisory API."
              : `${advisoryRows.length} upstream repo(s) have published security advisories listed below.`;
            const advisoryAvailability = advisoryUnavailableRows.length === 0
              ? ""
              : ` ${advisoryUnavailableRows.length} repository advisory check(s) were unavailable; review those upstream repositories manually.`;
            const body = [
              "<!-- faos-upstream-tracker -->",
              "# Upstream Release/Security Tracking",
              "",
              `Last automated check: ${new Date().toISOString()}`,
              `Workflow run: ${runUrl}`,
              "",
              driftSummary,
              advisorySummary + advisoryAvailability,
              "",
              table,
              "",
              "## Security Review Queue",
              "",
              "- [ ] Review upstream release notes for each row marked `review available upstream change`.",
              "- [ ] Review linked published repository advisories before bumping pins.",
              "- [ ] Check GitHub Security Advisories manually for rows where the repository advisory check was unavailable.",
              "- [ ] Re-run the `docs/OS_BUILD.md` rebrand checklist against any bumped OS tag.",
              "- [ ] Confirm no Home Assistant/OHF marks re-enter shipped user-facing artifacts.",
              "- [ ] Confirm the monitoring-only safety boundary still holds.",
              "",
              "This workflow only tracks upstream state using release/tag lookups and GitHub's public repository security advisory API. It does not modify pins, merge upstream code, or replace the manual security review required before a release.",
            ].join("\n");

            const { owner, repo } = context.repo;
            const title = process.env.TRACKER_TITLE;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const existing = issues.find((issue) => (
              issue.title === title && !issue.pull_request
            ));

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
              core.notice(`Updated issue #${existing.number}: ${title}`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
              core.notice(`Created issue #${created.data.number}: ${title}`);
            }

            await core.summary
              .addHeading("Upstream release/security tracking")
              .addRaw(driftSummary)
              .addRaw("\n\n")
              .addRaw(advisorySummary + advisoryAvailability)
              .addRaw("\n\n")
              .addRaw(table)
              .write();
