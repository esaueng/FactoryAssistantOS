# Mirror the Home Assistant Supervisor system plugins into the Factory Assistant
# registry and publish the branded Factory Assistant CLI + landingpage images so
# the FA update channel resolves every component from ghcr.io/esaueng.
#
# The channel (version-service/stable.json) names ghcr.io/esaueng/{arch}-hassio-cli
# etc.; without these images a running Supervisor 404s on the plugin pulls. The
# plugins dns/audio/multicast/observer carry no user-visible branding
# (config-only). The CLI and first-boot landingpage are not mirrored from
# upstream: this workflow builds plugin-cli/ and landingpage/ so the visible
# shell and preparing page are Factory Assistant branded.
#
# Source tags are the current upstream plugin versions; the target tag is the FA
# release version (channel default 2026.6.0). Re-pin source tags when upstream
# plugin versions move. Every published image is re-labeled so io.hass.version
# equals the FA target tag: the Supervisor keys off that label to find the image
# to start, so a label that disagrees with the tag breaks plugin startup. Push
# auth prefers a GHCR_PAT secret (write:packages), falling back to GITHUB_TOKEN
# (which can create these NEW org packages).
#
# After a successful run, make the 5 plugin packages and landingpage image
# package PUBLIC (the appliance pulls anonymously).
name: Mirror FA plugins + branded local images

on:
  workflow_dispatch:
    inputs:
      fa_version:
        description: "FA release tag to publish plugins under (matches the channel)"
        required: true
        default: "2026.6.0"
  push:
    branches: ["mirror-fa-plugins"]
    paths:
      - ".github/workflows/mirror-fa-plugins.yml"
      - "plugin-cli/**"
      - "landingpage/**"

env:
  FA_VERSION: "2026.6.0"

permissions:
  contents: read
  packages: write

jobs:
  mirror:
    name: Publish plugins (upstream mirrors + local branding)
    runs-on: ubuntu-24.04
    steps:
      - name: Check out local build contexts
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Mirror the unbranded system plugins (re-tagged + re-labeled to the FA version)
        run: |
          set -euxo pipefail
          ver="${{ inputs.fa_version || env.FA_VERSION }}"
          # NOTE: do NOT use `docker buildx imagetools create` here. That copies the
          # upstream manifest verbatim, keeping the upstream io.hass.version label
          # (e.g. 2026.02.0). The Supervisor trusts io.hass.version (const.LABEL_VERSION)
          # as a plugin's installed version and then references
          # ghcr.io/esaueng/<arch>-hassio-<slug>:<that-version> — a tag we never
          # publish — so the plugin (incl. hassio_cli) never starts. Rebuild with an
          # overriding LABEL so io.hass.version == the FA tag == the update-channel
          # version.
          copy() { # $1 = plugin slug, $2 = upstream source tag
            printf 'FROM ghcr.io/home-assistant/amd64-hassio-%s:%s\nLABEL io.hass.version="%s" org.opencontainers.image.version="%s"\n' \
              "$1" "$2" "${ver}" "${ver}" \
            | docker buildx build \
                --platform linux/amd64 \
                --pull \
                --push \
                -t "ghcr.io/esaueng/amd64-hassio-$1:${ver}" \
                -
          }
          copy dns       2026.02.0
          copy audio     2026.02.0
          copy observer  2026.02.0
          copy multicast 2026.02.0

      - name: Build and publish the Factory Assistant CLI plugin
        run: |
          set -euxo pipefail
          ver="${{ inputs.fa_version || env.FA_VERSION }}"
          docker buildx build \
            --platform linux/amd64 \
            --pull \
            --push \
            --build-arg CLI_SOURCE_TAG=2026.05.0 \
            --build-arg FA_VERSION="${ver}" \
            -t "ghcr.io/esaueng/amd64-hassio-cli:${ver}" \
            plugin-cli

      - name: Re-stamp the Core machine image to the FA version
        run: |
          set -euxo pipefail
          ver="${{ inputs.fa_version || env.FA_VERSION }}"
          # factory-assistant-core builds the Core image as a dev nightly, so its
          # io.hass.version is e.g. 2026.7.0.devNNN; the FA release tag (this ver)
          # is applied separately. As with the plugins, the Supervisor reads
          # io.hass.version (const.LABEL_VERSION) as Core's installed version and
          # then (re)starts ghcr.io/esaueng/generic-x86-64-homeassistant:<that
          # version>. If the label disagrees with the FA tag the Supervisor pulls a
          # tag that was never published, Core never starts, and backups/restore
          # fail. Re-tag the image so io.hass.version == the FA tag == the channel
          # "homeassistant" version, preserving the image content. Durable fix: have
          # the FA Core release process stamp io.hass.version to the FA tag.
          printf 'FROM ghcr.io/esaueng/generic-x86-64-homeassistant:%s\nLABEL io.hass.version="%s" org.opencontainers.image.version="%s"\n' \
            "${ver}" "${ver}" "${ver}" \
          | docker buildx build \
              --platform linux/amd64 \
              --pull \
              --push \
              -t "ghcr.io/esaueng/generic-x86-64-homeassistant:${ver}" \
              -

      - name: Build and publish the Factory Assistant landingpage
        run: |
          set -euxo pipefail
          ver="${{ inputs.fa_version || env.FA_VERSION }}"
          docker buildx build \
            --platform linux/amd64 \
            --pull \
            --push \
            -t "ghcr.io/esaueng/generic-x86-64-homeassistant:landingpage" \
            -t "ghcr.io/esaueng/generic-x86-64-homeassistant:${ver}-landingpage" \
            --label "org.opencontainers.image.version=${ver}" \
            landingpage

      - name: Next steps
        run: |
          {
            echo "Mirrored to ghcr.io/esaueng/amd64-hassio-{dns,audio,observer,multicast}:${{ inputs.fa_version || env.FA_VERSION }}"
            echo "Published branded CLI plugin to ghcr.io/esaueng/amd64-hassio-cli:${{ inputs.fa_version || env.FA_VERSION }}"
            echo "Published branded landingpage to ghcr.io/esaueng/generic-x86-64-homeassistant:landingpage"
            echo ""
            echo "NEXT: make the 5 plugin packages and the generic-x86-64-homeassistant package **public** (org Packages settings) — the appliance pulls anonymously."
          } >> "$GITHUB_STEP_SUMMARY"
